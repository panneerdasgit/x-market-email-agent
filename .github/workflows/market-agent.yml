name: X Market Email Agent V2.1

on:
  schedule:
    # GitHub cron uses UTC.
    # 8:30 AM IST
    - cron: "0 3 * * 1-5"

    # 10:30 AM IST
    - cron: "0 5 * * 1-5"

    # 12:30 PM IST
    - cron: "0 7 * * 1-5"

    # 2:30 PM IST
    - cron: "0 9 * * 1-5"

    # 4:15 PM IST
    - cron: "45 10 * * 1-5"

  workflow_dispatch:
    inputs:
      job_type:
        description: "Choose the content type"
        required: true
        default: "premarket"
        type: choice
        options:
          - premarket
          - breaking
          - stock_focus
          - education
          - closing

permissions:
  contents: write

concurrency:
  group: x-market-email-agent-v2-1
  cancel-in-progress: false

jobs:
  generate-and-email:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Determine content type
        id: content
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            JOB_TYPE="${{ inputs.job_type }}"
          else
            case "${{ github.event.schedule }}" in
              "0 3 * * 1-5") JOB_TYPE="premarket" ;;
              "0 5 * * 1-5") JOB_TYPE="breaking" ;;
              "0 7 * * 1-5") JOB_TYPE="stock_focus" ;;
              "0 9 * * 1-5") JOB_TYPE="education" ;;
              "45 10 * * 1-5") JOB_TYPE="closing" ;;
              *)
                echo "Unknown schedule: ${{ github.event.schedule }}"
                exit 1
                ;;
            esac
          fi

          echo "job_type=$JOB_TYPE" >> "$GITHUB_OUTPUT"
          echo "Selected content type: $JOB_TYPE"

      - name: Generate post and email it
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python agent.py "${{ steps.content.outputs.job_type }}"

      - name: Commit updated history
        shell: bash
        run: |
          if git diff --quiet history.json; then
            echo "No history changes."
            exit 0
          fi

          git config user.name "x-market-email-agent"
          git config user.email "x-market-email-agent@users.noreply.github.com"

          git add history.json
          git commit -m "Update Version 2.1 history"
          git pull --rebase origin "${{ github.ref_name }}"
          git push origin "HEAD:${{ github.ref_name }}"
